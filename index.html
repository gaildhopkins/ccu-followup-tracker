<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CCU Initial Eval & Follow-Up Tracker</title>
<style>
  :root{
    --bg:#0B1220;
    --panel:#121B2E;
    --panel-2:#0F1829;
    --border:#1E2A3F;
    --border-soft:#182338;
    --teal:#2DD4BF;
    --teal-dim:#155E56;
    --teal-bg:rgba(45,212,191,0.10);
    --text:#E7ECF3;
    --text-dim:#8FA0B8;
    --text-faint:#5B6B84;
    --amber:#F5B942;
    --amber-bg:rgba(245,185,66,0.12);
    --red:#F16565;
    --red-bg:rgba(241,101,101,0.12);
    --green:#3FD07E;
    --green-bg:rgba(63,208,126,0.10);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;}
  body{padding-bottom:60px;}

  header{position:sticky; top:0; z-index:50; background:rgba(11,18,32,0.92); backdrop-filter:blur(8px);
    border-bottom:1px solid var(--border); padding:14px 20px;}
  .header-row{display:flex; align-items:center; justify-content:space-between; max-width:1100px; margin:0 auto; flex-wrap:wrap; gap:10px;}
  .brand{display:flex; align-items:baseline; gap:10px;}
  .brand .dot{width:9px; height:9px; border-radius:50%; background:var(--teal); box-shadow:0 0 10px var(--teal);}
  .brand h1{font-size:16px; margin:0; font-weight:650; letter-spacing:0.2px;}
  .brand .sub{font-size:11px; color:var(--text-dim); letter-spacing:0.3px; text-transform:uppercase;}

  main{max-width:1100px; margin:0 auto; padding:20px;}

  .panel{background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:18px; margin-bottom:16px;}
  .panel-title{font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:0.6px; color:var(--teal); margin:0 0 12px 0;}
  .panel-title-row{display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; margin-bottom:12px;}
  .panel-title-row .panel-title{margin:0;}
  .panel-toolbar{display:flex; gap:8px; flex-wrap:wrap;}

  /* ---------- Patients / Tracker ---------- */
  .add-patient-row{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:6px;}
  input, select, textarea{background:var(--panel-2); border:1px solid var(--border); color:var(--text);
    border-radius:8px; padding:9px 11px; font-size:14px; font-family:inherit;}
  input::placeholder, textarea::placeholder{color:var(--text-faint);}
  input:focus, select:focus, textarea:focus{outline:none; border-color:var(--teal);}
  .btn{background:var(--teal); color:#04201C; border:none; border-radius:8px; padding:9px 15px;
    font-size:13px; font-weight:700; cursor:pointer; transition:opacity .15s;}
  .btn:hover{opacity:0.88;}
  .btn.secondary{background:var(--panel-2); color:var(--text); border:1px solid var(--border);}
  .btn.danger{background:var(--red-bg); color:var(--red); border:1px solid rgba(241,101,101,0.3);}
  .btn.small{padding:5px 10px; font-size:12px;}

  .unit-group-title{display:flex; align-items:center; gap:8px; margin:20px 0 10px 0; padding-bottom:6px;
    border-bottom:1px solid var(--border-soft);}
  .unit-group-title:first-child{margin-top:4px;}
  .unit-badge{font-size:11px; font-weight:800; padding:3px 9px; border-radius:8px; text-transform:uppercase; letter-spacing:0.5px;}
  .unit-badge.ccu{background:var(--teal-bg); color:var(--teal);}
  .unit-badge.floor{background:rgba(255,255,255,0.07); color:var(--text-dim);}
  .unit-group-title .count{font-size:11.5px; color:var(--text-faint);}

  .patient-card{background:var(--panel-2); border:1px solid var(--border-soft); border-radius:12px;
    padding:14px 16px; margin-bottom:12px;}
  .patient-head{display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:8px; cursor:pointer;}
  .patient-name{font-size:15px; font-weight:700;}
  .patient-meta{font-size:12px; color:var(--text-dim); margin-top:2px;}
  .patient-badges{display:flex; gap:6px; flex-wrap:wrap; justify-content:flex-end;}
  .badge{display:inline-block; font-size:11px; font-weight:700; padding:2px 8px; border-radius:20px;}
  .badge.overdue{background:var(--red-bg); color:var(--red);}
  .badge.today{background:var(--amber-bg); color:var(--amber);}
  .badge.ok{background:var(--green-bg); color:var(--green);}
  .badge.none{background:rgba(255,255,255,0.06); color:var(--text-faint);}

  .task-list{margin-top:12px; border-top:1px solid var(--border-soft); padding-top:10px; display:none;}
  .task-list.open{display:block;}
  .task-row{display:flex; align-items:flex-start; gap:10px; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.04);}
  .task-row:last-child{border-bottom:none;}
  .task-check{width:18px; height:18px; margin-top:2px; accent-color:var(--teal); cursor:pointer; flex-shrink:0;}
  .task-text{flex:1; font-size:13.5px;}
  .task-text.done{color:var(--text-faint); text-decoration:line-through;}
  .task-due{font-size:11px; color:var(--text-dim); white-space:nowrap;}
  .task-due.overdue{color:var(--red); font-weight:700;}
  .task-due.today{color:var(--amber); font-weight:700;}
  .task-priority{font-size:10px; font-weight:700; padding:1px 6px; border-radius:10px; text-transform:uppercase;}
  .task-priority.urgent{background:var(--red-bg); color:var(--red);}
  .task-priority.routine{background:rgba(255,255,255,0.06); color:var(--text-dim);}
  .del-task{background:none; border:none; color:var(--text-faint); cursor:pointer; font-size:15px; padding:0 4px;}
  .del-task:hover{color:var(--red);}

  .add-task-row{display:flex; gap:6px; flex-wrap:wrap; margin-top:10px; align-items:center;}
  .add-task-row input[type=text]{flex:2; min-width:160px;}
  .add-task-row input[type=date]{flex:1; min-width:130px;}
  .add-task-row select{flex:0 0 auto;}

  .empty{color:var(--text-faint); font-size:13px; text-align:center; padding:30px 0;}

  /* ---------- Daily Rounds ---------- */
  .rounds-head-row{display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end; margin-bottom:4px;}
  .rounds-field{display:flex; flex-direction:column; gap:3px;}
  .rounds-field label{font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.4px;}
  .rounds-field input, .rounds-field select{font-size:13px; padding:7px 9px;}
  .focus-chips{display:flex; gap:6px; flex-wrap:wrap; margin:10px 0 2px 0;}
  .focus-chip{font-size:11.5px; font-weight:600; padding:5px 11px; border-radius:20px;
    border:1px solid var(--border); background:var(--panel-2); color:var(--text-dim); cursor:pointer;}
  .focus-chip.active{background:var(--teal-bg); color:var(--teal); border-color:var(--teal-dim);}
  .rounds-section{margin-top:12px; border-top:1px solid var(--border-soft); padding-top:10px;}
  .rounds-section-title{font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-dim); margin-bottom:4px;}
  .rounds-item{display:flex; align-items:flex-start; gap:9px; padding:5px 0;}
  .rounds-item input[type=checkbox]{width:16px; height:16px; margin-top:2px; accent-color:var(--teal); cursor:pointer; flex-shrink:0;}
  .rounds-item label{font-size:13px; line-height:1.4; cursor:pointer; flex:1;}
  .rounds-item .note{display:block; font-size:11px; color:var(--text-dim); margin-top:1px;}
  .prev-hint{font-size:10px; font-weight:700; color:var(--teal); background:var(--teal-bg);
    border:1px solid rgba(45,212,191,0.3); border-radius:10px; padding:2px 8px; cursor:pointer; white-space:nowrap; flex-shrink:0;}
  .prev-hint:hover{opacity:0.8;}
  .rounds-footer-row{display:flex; justify-content:flex-end; gap:6px; margin-top:12px; flex-wrap:wrap;}

  footer{text-align:center; font-size:11px; color:var(--text-faint); padding:30px 20px 10px; letter-spacing:0.2px;}

  @media (max-width:600px){
    .brand h1{font-size:14px;}
    .task-due{white-space:normal;}
  }

  /* ---------- Print / PDF export ---------- */
  #print-area{display:none;}
  @media print{
    @page{ margin:1.4cm; }
    body > *:not(#print-area){ display:none !important; }
    body{ background:#fff !important; padding:0 !important; }
    #print-area{ display:block !important; background:#fff; color:#1a1a1a;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
  }
  .print-header{border-bottom:2px solid #333; padding-bottom:10px; margin-bottom:16px;}
  .print-header h1{font-size:19px; margin:0 0 4px 0;}
  .print-meta{font-size:11px; color:#555;}
  .print-patient{margin-bottom:14px;}
  .print-patient-name{font-size:16px; font-weight:700;}
  .print-patient-room{font-size:12px; color:#555; margin-top:1px;}
  .print-section{margin-bottom:18px;}
  .print-section h2{font-size:12.5px; text-transform:uppercase; letter-spacing:0.5px; color:#333;
    border-bottom:1px solid #ccc; padding-bottom:4px; margin:0 0 8px 0;}
  .print-table{width:100%; border-collapse:collapse; font-size:12px;}
  .print-table th, .print-table td{text-align:left; padding:5px 8px; border-bottom:1px solid #ddd; vertical-align:top;}
  .print-table th{font-size:10.5px; text-transform:uppercase; color:#555; font-weight:700;}
  .print-status-overdue{color:#b91c1c; font-weight:700;}
  .print-status-today{color:#b45309; font-weight:700;}
  .print-status-ok{color:#1a7a4c;}
  .print-list{list-style:none; padding:0; margin:0; font-size:12.5px;}
  .print-list li{padding:3px 0;}
  .print-checked{color:#1a1a1a;}
  .print-unchecked{color:#888;}
  .print-dim{color:#888; font-size:11px;}
  .print-empty{font-size:12px; color:#888; font-style:italic; margin:0;}
  .print-cat{margin-bottom:10px;}
  .print-cat-title{font-weight:700; font-size:12.5px; margin-bottom:3px;}
  .print-footer{margin-top:24px; padding-top:8px; border-top:1px solid #ccc; font-size:10.5px; color:#888; text-align:center;}
  .print-patient-block + .print-patient-block{margin-top:26px;}
  .print-pagebreak{page-break-after:always;}
  .print-rounds-table{font-size:10.5px;}
  .print-rounds-table th, .print-rounds-table td{padding:4px 6px;}
  .print-focus-cell div{margin-bottom:2px;}
</style>
</head>
<body>

<header>
  <div class="header-row">
    <div class="brand">
      <span class="dot"></span>
      <div>
        <h1>CCU Tracker</h1>
        <div class="sub">Daily Rounds &amp; Follow-Up</div>
      </div>
    </div>
  </div>
</header>

<main>

  <!-- ===================== DAILY ROUNDS VIEW ===================== -->
  <div id="view-rounds">
    <div class="panel">
      <div class="panel-title-row">
        <div class="panel-title">Add / Update Patient</div>
        <div class="panel-toolbar">
          <button class="btn secondary small" id="rounds-export-btn">Print Today's Rounds</button>
          <button class="btn secondary small" id="export-all-btn">Full Detail Export (All)</button>
        </div>
      </div>
      <div class="add-patient-row">
        <input type="text" id="rp-name" placeholder="Name / Initials" style="flex:2; min-width:130px;">
        <input type="text" id="rp-room" placeholder="Room / Bed" style="flex:1; min-width:90px;">
        <input type="text" id="rp-dx" placeholder="Diagnosis / RFA" style="flex:2; min-width:150px;">
        <input type="number" id="rp-ef" placeholder="EF %" style="flex:0 0 80px;">
        <select id="rp-unit" style="flex:0 0 140px;">
          <option value="ccu">CCU</option>
          <option value="floor">Cardiac Floor</option>
        </select>
        <button class="btn" id="rounds-add-btn">+ Add Patient</button>
      </div>
      <div style="font-size:11.5px; color:var(--text-dim); margin-top:8px;">Patients stay on this list day to day &mdash; remove only when discharged or transferred off your beds. Review checklist items reset each day but show a hint if confirmed the day before.</div>
    </div>

    <div id="rounds-list"></div>
  </div>

</main>

<footer>G. Hopkins, RPh | RVH CCU | For Educational Use Only</footer>

<!-- Populated on demand and shown only when printing -->
<div id="print-area"></div>

<script>
(function(){
  "use strict";

  // ---------------- Storage ----------------
  var STORE_KEY = "ccu_tracker_v1";
  function loadState(){
    var s;
    try{
      var raw = localStorage.getItem(STORE_KEY);
      if(raw) s = JSON.parse(raw);
    }catch(e){}
    if(!s) s = { patients: [] };
    if(!s.patients) s.patients = [];

    // One-time migration: pull any previously separate "Daily Rounds" list into the unified patient list.
    if(!s.migratedRounds && s.roundsPatients && s.roundsPatients.length){
      s.roundsPatients.forEach(function(rp){
        s.patients.push({
          id: rp.id, name: rp.name, room: rp.room || "", dx: rp.dx || "", ef: rp.ef || "",
          unit: "floor", tasks: [],
          focus: rp.focus || {}, renalValue: rp.renalValue || "", renalTrend: rp.renalTrend || "", crcl: rp.crcl || "",
          tdmAgent: rp.tdmAgent || "", tdmNextTrough: rp.tdmNextTrough || "", tdmTarget: rp.tdmTarget || "", tdmFrequency: rp.tdmFrequency || "",
          a1cLevel: rp.a1cLevel || "", a1cChanges: rp.a1cChanges || "",
          checksByDate: rp.checksByDate || {}
        });
      });
    }
    s.migratedRounds = true;
    delete s.roundsPatients;

    // Backfill any missing fields on existing patient records (from earlier versions of this file).
    s.patients.forEach(function(p){
      if(p.unit === undefined) p.unit = "ccu";
      if(!p.tasks) p.tasks = [];
      if(!p.focus) p.focus = {};
      if(p.renalValue === undefined) p.renalValue = "";
      if(p.renalTrend === undefined) p.renalTrend = "";
      if(p.crcl === undefined) p.crcl = "";
      if(p.tdmAgent === undefined) p.tdmAgent = "";
      if(p.tdmNextTrough === undefined) p.tdmNextTrough = "";
      if(p.tdmTarget === undefined) p.tdmTarget = "";
      if(p.tdmFrequency === undefined) p.tdmFrequency = "";
      if(p.a1cLevel === undefined) p.a1cLevel = "";
      if(p.a1cChanges === undefined) p.a1cChanges = "";
      if(!p.checksByDate) p.checksByDate = {};
      if(p.dx === undefined) p.dx = "";
      if(p.ef === undefined) p.ef = "";
    });
    return s;
  }
  function saveState(){
    try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }catch(e){}
  }
  var state = loadState();
  saveState();

  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

  // ---------------- Daily Rounds Checklist Template ----------------
  var ROUNDS_CORE_ITEMS = [
    { id: "medrec", t: "Med rec reviewed", n: "Home med list reconciled vs current orders" },
    { id: "vte", t: "VTE prophylaxis appropriate", n: "Check bleeding/renal contraindication; document if held" },
    { id: "renaldose", t: "Renal-dosed meds reviewed", n: "Adjust for current eGFR/Clcr trend" },
    { id: "ivpo", t: "IV→PO conversion reviewed", n: "Diuretics, PPIs, antiarrhythmics, anticoagulants, antibiotics" },
  ];

  var ROUNDS_FOCUS_AREAS = {
    abx: { label: "Antibiotics", items: [
      { id: "abx-dur", t: "Duration / stop date documented" },
      { id: "abx-renal", t: "Renal dosing confirmed" },
      { id: "abx-cx", t: "Cultures / sensitivities reviewed" },
    ]},
    insulin: { label: "Insulin / Glycemia", items: [
      { id: "ins-poc", t: "POC glucose trend reviewed" },
      { id: "ins-regimen", t: "Sliding scale vs basal-bolus appropriate" },
    ]},
    hfref: { label: "HFrEF (EF ≤40%)", items: [
      { id: "hfref-arni", t: "ARNI / ACEi / ARB", n: "Continued, held, or contraindicated — document why" },
      { id: "hfref-bb", t: "Beta-blocker" },
      { id: "hfref-mra", t: "MRA", n: "EF ≤40% + HF or DM" },
      { id: "hfref-sglt2", t: "SGLT2i" },
      { id: "hfref-diur", t: "Diuretic optimized for euvolemia" },
    ]},
    hfpef: { label: "HFpEF (EF >40%, HF)", items: [
      { id: "hfpef-sglt2", t: "SGLT2i" },
      { id: "hfpef-mra", t: "MRA if applicable" },
      { id: "hfpef-diur", t: "Diuretic optimized for euvolemia" },
    ]},
    af: { label: "Atrial Fibrillation", items: [
      { id: "af-oac", t: "Anticoagulation indicated & renal-dosed", n: "Assess bleeding risk (HAS-BLED or equivalent)" },
      { id: "af-rate", t: "Rate / rhythm control plan clear" },
    ]},
    acs: { label: "ACS", items: [
      { id: "acs-asa", t: "ASA" },
      { id: "acs-p2y12", t: "P2Y12 inhibitor" },
      { id: "acs-statin", t: "High-intensity statin" },
      { id: "acs-ace", t: "ACEi/ARB", n: "Per EF" },
      { id: "acs-bb", t: "Beta-blocker", n: "Per EF" },
    ]},
  };

  var UNIT_LABELS = { ccu: "CCU", floor: "Cardiac Floor" };
  var UNIT_ORDER = ["ccu", "floor"];

  // TDM is rendered as a dedicated Agent + Next Trough Due mini-form rather than a checklist,
  // so it's toggled through the same focus-chip mechanism but ordered/labeled separately.
  var FOCUS_ORDER = ["abx", "insulin", "tdm", "hfref", "hfpef", "af", "acs"];
  var TDM_AGENTS = ["", "Vancomycin", "Gentamicin", "Digoxin", "Other"];
  function focusLabel(key){
    return key === "tdm" ? "TDM / Levels" : ROUNDS_FOCUS_AREAS[key].label;
  }
  function formatDateTime(dtStr){
    if(!dtStr) return "";
    var d = new Date(dtStr);
    if(isNaN(d.getTime())) return dtStr;
    return d.toLocaleDateString(undefined, { month:"short", day:"numeric" }) + " " + d.toLocaleTimeString(undefined, { hour:"numeric", minute:"2-digit" });
  }

  // ================= DATE HELPERS =================
  function todayStr(){
    var d = new Date();
    return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
  }
  function dueStatus(dateStr){
    if(!dateStr) return "none";
    if(dateStr < todayStr()) return "overdue";
    if(dateStr === todayStr()) return "today";
    return "ok";
  }
  function formatDue(dateStr){
    if(!dateStr) return "No date";
    var parts = dateStr.split("-");
    var d = new Date(parts[0], parts[1]-1, parts[2]);
    return d.toLocaleDateString(undefined, { month:"short", day:"numeric" });
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, function(c){
      return { "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c];
    });
  }

  // ================= PATIENT LIST (Daily Rounds + Follow-Up) =================
  var openPatients = {};

  document.getElementById("rounds-add-btn").addEventListener("click", addPatient);
  document.getElementById("rp-name").addEventListener("keydown", function(e){ if(e.key==="Enter") addPatient(); });
  document.getElementById("rounds-export-btn").addEventListener("click", exportRoundsPDF);
  document.getElementById("export-all-btn").addEventListener("click", exportAllPatients);

  function addPatient(){
    var nameEl = document.getElementById("rp-name");
    var roomEl = document.getElementById("rp-room");
    var dxEl = document.getElementById("rp-dx");
    var efEl = document.getElementById("rp-ef");
    var unitEl = document.getElementById("rp-unit");
    var name = nameEl.value.trim();
    if(!name) return;
    var p = {
      id: uid(), name: name, room: roomEl.value.trim(), dx: dxEl.value.trim(), ef: efEl.value.trim(),
      unit: unitEl.value, tasks: [], focus: {}, renalValue: "", renalTrend: "", crcl: "",
      tdmAgent: "", tdmNextTrough: "", tdmTarget: "", tdmFrequency: "", a1cLevel: "", a1cChanges: "", checksByDate: {}
    };
    state.patients.unshift(p);
    nameEl.value = ""; roomEl.value = ""; dxEl.value = ""; efEl.value = "";
    saveState();
    renderPatients();
  }

  function deletePatient(id){
    if(!confirm("Remove this patient? Use this when discharged or transferred off your beds. This also removes their follow-up tasks and review history.")) return;
    state.patients = state.patients.filter(function(p){ return p.id !== id; });
    saveState();
    renderPatients();
  }

  function updatePatientField(pid, field, value){
    var p = state.patients.find(function(p){ return p.id === pid; });
    if(!p) return;
    p[field] = value;
    saveState();
  }

  function groupedPatients(){
    var groups = { ccu: [], floor: [] };
    state.patients.forEach(function(p){ (groups[p.unit] || groups.floor).push(p); });
    return groups;
  }

  // ---- Follow-up task badge ----
  function taskBadge(p){
    var statuses = p.tasks.filter(function(t){ return !t.done; }).map(function(t){ return dueStatus(t.due); });
    if(statuses.indexOf("overdue") !== -1) return { cls:"overdue", label: statuses.filter(s=>s==="overdue").length + " overdue" };
    if(statuses.indexOf("today") !== -1) return { cls:"today", label: statuses.filter(s=>s==="today").length + " due today" };
    if(statuses.length > 0) return { cls:"ok", label: statuses.length + " open task" + (statuses.length===1?"":"s") };
    return { cls:"none", label:"No open tasks" };
  }

  // ---- Daily rounds review badge ----
  function roundsBadge(p){
    var today = getTodayChecks(p);
    var coreDone = ROUNDS_CORE_ITEMS.filter(function(i){ return today[i.id]; }).length;
    var coreTotal = ROUNDS_CORE_ITEMS.length;
    var cls = coreDone === coreTotal ? "ok" : (coreDone === 0 ? "none" : "today");
    return { cls: cls, label: coreDone + "/" + coreTotal + " core reviewed" };
  }

  function getTodayChecks(p){
    return p.checksByDate[todayStr()] || {};
  }
  function getPrevChecks(p){
    var dates = Object.keys(p.checksByDate).filter(function(d){ return d < todayStr(); }).sort();
    if(!dates.length) return {};
    return p.checksByDate[dates[dates.length-1]] || {};
  }
  function toggleRoundsCheck(pid, itemId){
    var p = state.patients.find(function(p){ return p.id === pid; });
    if(!p) return;
    var t = todayStr();
    if(!p.checksByDate[t]) p.checksByDate[t] = {};
    p.checksByDate[t][itemId] = !p.checksByDate[t][itemId];
    saveState();
    renderPatients();
  }
  function carryForwardAll(pid){
    var p = state.patients.find(function(p){ return p.id === pid; });
    if(!p) return;
    var prev = getPrevChecks(p);
    var t = todayStr();
    if(!p.checksByDate[t]) p.checksByDate[t] = {};
    Object.keys(prev).forEach(function(k){ if(prev[k]) p.checksByDate[t][k] = true; });
    saveState();
    renderPatients();
  }
  function toggleFocusArea(pid, key){
    var p = state.patients.find(function(p){ return p.id === pid; });
    if(!p) return;
    p.focus[key] = !p.focus[key];
    saveState();
    renderPatients();
  }

  function roundsItemHtml(pid, item, todayChecks, prevChecks){
    var checked = !!todayChecks[item.id];
    var showHint = !checked && !!prevChecks[item.id];
    return '<div class="rounds-item">' +
      '<input type="checkbox" id="rchk-' + pid + '-' + item.id + '" data-pid="' + pid + '" data-item="' + item.id + '" ' + (checked ? "checked" : "") + '>' +
      '<label for="rchk-' + pid + '-' + item.id + '">' + escapeHtml(item.t) + (item.n ? '<span class="note">' + escapeHtml(item.n) + '</span>' : '') + '</label>' +
      (showHint ? '<span class="prev-hint" data-carry-item="' + pid + '|' + item.id + '" title="Checked on a previous day — click to confirm for today">✓ prior</span>' : '') +
    '</div>';
  }

  // ---- Follow-up tasks ----
  function taskRowHtml(pid, t){
    var status = t.done ? "" : dueStatus(t.due);
    var dueCls = status === "overdue" ? "overdue" : (status === "today" ? "today" : "");
    return '<div class="task-row">' +
      '<input type="checkbox" class="task-check" data-pid="' + pid + '" data-tid="' + t.id + '" ' + (t.done ? "checked" : "") + '>' +
      '<div class="task-text ' + (t.done ? "done" : "") + '">' + escapeHtml(t.text) +
        (t.priority === "urgent" ? ' <span class="task-priority urgent">Urgent</span>' : '') +
      '</div>' +
      '<div class="task-due ' + dueCls + '">' + formatDue(t.due) + '</div>' +
      '<button class="del-task" data-pid="' + pid + '" data-tid="' + t.id + '" title="Delete">×</button>' +
    '</div>';
  }

  function addTask(pid){
    var p = state.patients.find(function(p){ return p.id === pid; });
    if(!p) return;
    var textEl = document.getElementById("nt-text-" + pid);
    var dateEl = document.getElementById("nt-date-" + pid);
    var priEl = document.getElementById("nt-pri-" + pid);
    var text = textEl.value.trim();
    if(!text) return;
    p.tasks.push({ id: uid(), text: text, due: dateEl.value || "", priority: priEl.value, done: false });
    saveState();
    openPatients[pid] = true;
    renderPatients();
  }

  function toggleTask(pid, tid){
    var p = state.patients.find(function(p){ return p.id === pid; });
    if(!p) return;
    var t = p.tasks.find(function(t){ return t.id === tid; });
    if(!t) return;
    t.done = !t.done;
    saveState();
    openPatients[pid] = true;
    renderPatients();
  }

  function deleteTask(pid, tid){
    var p = state.patients.find(function(p){ return p.id === pid; });
    if(!p) return;
    p.tasks = p.tasks.filter(function(t){ return t.id !== tid; });
    saveState();
    openPatients[pid] = true;
    renderPatients();
  }

  // Creates a follow-up task for each currently-unchecked core/active-focus-area item,
  // skipping items that already have an open (not done) auto-generated task.
  function addFollowUpsForUnchecked(pid){
    var p = state.patients.find(function(p){ return p.id === pid; });
    if(!p) return;
    var today = getTodayChecks(p);
    var candidates = ROUNDS_CORE_ITEMS.map(function(item){ return { item: item, area: "Core Review" }; });
    Object.keys(ROUNDS_FOCUS_AREAS).forEach(function(key){
      if(p.focus[key]){
        var area = ROUNDS_FOCUS_AREAS[key];
        area.items.forEach(function(item){ candidates.push({ item: item, area: area.label }); });
      }
    });

    var openSourceIds = p.tasks.filter(function(t){ return !t.done; }).map(function(t){ return t.sourceItem; });
    var added = 0;
    candidates.forEach(function(c){
      if(today[c.item.id]) return;
      if(openSourceIds.indexOf(c.item.id) !== -1) return;
      p.tasks.push({ id: uid(), text: c.area + ": " + c.item.t, due: "", priority: "routine", done: false, sourceItem: c.item.id });
      added++;
    });

    if(added === 0){
      alert("Nothing to add — all reviewed items are checked, or already have an open follow-up.");
      return;
    }
    saveState();
    renderPatients();
  }

  // ---- Main render ----
  function renderPatients(){
    var wrap = document.getElementById("rounds-list");
    wrap.innerHTML = "";
    if(state.patients.length === 0){
      wrap.innerHTML = '<div class="panel"><div class="empty">No patients yet. Add one above to start tracking rounds and follow-up.</div></div>';
      return;
    }
    var groups = groupedPatients();

    UNIT_ORDER.forEach(function(unitKey){
      var list = groups[unitKey];
      if(!list.length) return;
      var header = document.createElement("div");
      header.className = "unit-group-title";
      header.innerHTML = '<span class="unit-badge ' + unitKey + '">' + UNIT_LABELS[unitKey] + '</span>' +
        '<span class="count">' + list.length + ' patient' + (list.length===1?"":"s") + '</span>';
      wrap.appendChild(header);
      list.forEach(function(p){ wrap.appendChild(buildPatientCardEl(p)); });
    });

    wirePatientListEvents(wrap);
  }

  function buildPatientCardEl(p){
    var today = getTodayChecks(p);
    var prev = getPrevChecks(p);
    var tBadge = taskBadge(p);
    var rBadge = roundsBadge(p);

      .sort(function(a,b){ return (a.due||"9999").localeCompare(b.due||"9999"); });
    var doneTasks = p.tasks.filter(function(t){ return t.done; });
    var orderedTasks = openTasks.concat(doneTasks);

    var coreHtml = ROUNDS_CORE_ITEMS.map(function(item){ return roundsItemHtml(p.id, item, today, prev); }).join("");

    var focusHtml = "";

              TDM_AGENTS.map(function(a){ return '<option value="' + a + '"' + (p.tdmAgent === a ? " selected" : "") + '>' + (a || "— Select —") + '</option>'; }).join("") +
            '</select></div>' +
            '<div class="rounds-field"><label>Next Trough Due</label><input type="datetime-local" value="' + escapeHtml(p.tdmNextTrough) + '" data-field="tdmNextTrough" data-pid="' + p.id + '" style="width:190px;"></div>' +
            '<div class="rounds-field"><label>Target Level</label><input type="text" value="' + escapeHtml(p.tdmTarget) + '" data-field="tdmTarget" data-pid="' + p.id + '" style="width:110px;"></div>' +
            '<div class="rounds-field"><label>Monitoring Frequency</label><input type="text" value="' + escapeHtml(p.tdmFrequency) + '" data-field="tdmFrequency" data-pid="' + p.id + '" style="width:170px;"></div>' +
          '</div>' +
          '<button type="button" class="btn small secondary" data-tdm-note="' + p.id + '" style="margin-top:10px;">Generate TDM Consult Note</button>' +
        '</div>';
        return;
      }
      var area = ROUNDS_FOCUS_AREAS[key];
      var extraHtml = "";
      if(key === "insulin"){
        extraHtml = '<div class="rounds-head-row" style="margin-top:8px;">' +
          '<div class="rounds-field"><label>A1C Level</label><input type="text" value="' + escapeHtml(p.a1cLevel) + '" data-field="a1cLevel" data-pid="' + p.id + '" style="width:80px;"></div>' +
          '<div class="rounds-field"><label>Suggested Changes</label><input type="text" value="' + escapeHtml(p.a1cChanges) + '" data-field="a1cChanges" data-pid="' + p.id + '" style="width:240px;"></div>' +
        '</div>';
      }
      focusHtml += '<div class="rounds-section"><div class="rounds-section-title">' + escapeHtml(area.label) + '</div>' +
        area.items.map(function(item){ return roundsItemHtml(p.id, item, today, prev); }).join("") +
        extraHtml +
      '</div>';
    });

    var chipsHtml = FOCUS_ORDER.map(function(key){
      return '<button type="button" class="focus-chip' + (p.focus[key] ? " active" : "") + '" data-focus-toggle="' + p.id + '" data-focus-key="' + key + '">' + escapeHtml(focusLabel(key)) + '</button>';
    }).join("");

    var card = document.createElement("div");
    card.className = "patient-card";
    card.innerHTML =
      '<div class="patient-head" data-pid="' + p.id + '">' +
        '<div>' +
          '<span class="patient-name">' + escapeHtml(p.name) + '</span>' +
          (p.room ? '<span class="patient-meta"> Room ' + escapeHtml(p.room) + '</span>' : '') +
          (p.dx ? '<span class="patient-meta"> · ' + escapeHtml(p.dx) + '</span>' : '') +
          (p.ef ? '<span class="patient-meta"> · EF ' + escapeHtml(p.ef) + '%</span>' : '') +
        '</div>' +
        '<div class="patient-badges">' +
          '<span class="badge ' + rBadge.cls + '">' + rBadge.label + '</span>' +
          '<span class="badge ' + tBadge.cls + '">' + tBadge.label + '</span>' +
        '</div>' +
      '</div>' +
      '<div class="task-list" id="tasks-' + p.id + '">' +
        '<div class="rounds-head-row">' +
          '<div class="rounds-field"><label>Room</label><input type="text" value="' + escapeHtml(p.room) + '" data-field="room" data-pid="' + p.id + '" style="width:80px;"></div>' +
          '<div class="rounds-field"><label>Diagnosis</label><input type="text" value="' + escapeHtml(p.dx) + '" data-field="dx" data-pid="' + p.id + '" style="width:200px;"></div>' +
          '<div class="rounds-field"><label>EF %</label><input type="number" value="' + escapeHtml(p.ef) + '" data-field="ef" data-pid="' + p.id + '" style="width:70px;"></div>' +
          '<div class="rounds-field"><label>Unit</label><select data-field="unit" data-pid="' + p.id + '">' +
            UNIT_ORDER.map(function(u){ return '<option value="' + u + '"' + (p.unit === u ? " selected" : "") + '>' + UNIT_LABELS[u] + '</option>'; }).join("") +
          '</select></div>' +
          '<div class="rounds-field"><label>eGFR</label><input type="text" value="' + escapeHtml(p.renalValue) + '" data-field="renalValue" data-pid="' + p.id + '" style="width:65px;"></div>' +
          '<div class="rounds-field"><label>Trend</label><select data-field="renalTrend" data-pid="' + p.id + '">' +
            ["", "↑", "↓", "→"].map(function(t){ return '<option value="' + t + '"' + (p.renalTrend === t ? " selected" : "") + '>' + (t || "—") + '</option>'; }).join("") +
          '</select></div>' +
          '<div class="rounds-field"><label>CrCl</label><input type="text" value="' + escapeHtml(p.crcl) + '" data-field="crcl" data-pid="' + p.id + '" style="width:65px;"></div>' +
        '</div>' +
        '<div class="focus-chips">' + chipsHtml + '</div>' +
        '<div class="rounds-section"><div class="rounds-section-title">Core Review</div>' + coreHtml + '</div>' +
        focusHtml +
        '<div class="rounds-section"><div class="rounds-section-title">Follow-Up / To Do</div>' +
          (orderedTasks.length ? orderedTasks.map(function(t){ return taskRowHtml(p.id, t); }).join("") : '<div class="empty" style="padding:10px 0;">No follow-up tasks yet.</div>') +
          '<div class="add-task-row">' +
            '<input type="text" placeholder="New reminder / follow-up task" id="nt-text-' + p.id + '">' +
            '<input type="date" id="nt-date-' + p.id + '">' +
            '<select id="nt-pri-' + p.id + '"><option value="routine">Routine</option><option value="urgent">Urgent</option></select>' +
            '<button class="btn small" data-add-task="' + p.id + '">+ Add</button>' +
          '</div>' +
        '</div>' +
        '<div class="rounds-footer-row">' +
          '<button class="btn small secondary" data-carry-forward="' + p.id + '">Carry Forward Yesterday&rsquo;s ✓</button>' +
          '<button class="btn small secondary" data-add-followups="' + p.id + '">Add Follow-Ups for Unchecked</button>' +
          '<button class="btn small secondary" data-export-pdf="' + p.id + '">Export PDF</button>' +
          '<button class="btn small danger" data-del-patient="' + p.id + '">Remove (Discharged)</button>' +
        '</div>' +
      '</div>';
    return card;
  }

  function wirePatientListEvents(wrap){
    wrap.querySelectorAll(".patient-head[data-pid]").forEach(function(head){
      head.addEventListener("click", function(){
        var pid = head.dataset.pid;
        openPatients[pid] = !openPatients[pid];
        document.getElementById("tasks-" + pid).classList.toggle("open", openPatients[pid]);
      });
    });
    wrap.querySelectorAll("[data-field]").forEach(function(el){
      el.addEventListener("click", function(e){ e.stopPropagation(); });
      el.addEventListener("change", function(){
        openPatients[el.dataset.pid] = true;
        updatePatientField(el.dataset.pid, el.dataset.field, el.value);
        renderPatients();
      });
    });
    wrap.querySelectorAll("[data-focus-toggle]").forEach(function(btn){
      btn.addEventListener("click", function(e){
        e.stopPropagation();
        openPatients[btn.dataset.focusToggle] = true;
        toggleFocusArea(btn.dataset.focusToggle, btn.dataset.focusKey);
      });
    });
    wrap.querySelectorAll(".rounds-item input[type=checkbox]").forEach(function(cb){
      cb.addEventListener("click", function(e){ e.stopPropagation(); });
      cb.addEventListener("change", function(){
        openPatients[cb.dataset.pid] = true;
        toggleRoundsCheck(cb.dataset.pid, cb.dataset.item);
      });
    });
    wrap.querySelectorAll(".prev-hint").forEach(function(span){
      span.addEventListener("click", function(e){
        e.stopPropagation();
        var parts = span.dataset.carryItem.split("|");
        openPatients[parts[0]] = true;
        toggleRoundsCheck(parts[0], parts[1]);
      });
    });
    wrap.querySelectorAll("[data-carry-forward]").forEach(function(btn){
      btn.addEventListener("click", function(e){
        e.stopPropagation();
        openPatients[btn.dataset.carryForward] = true;
        carryForwardAll(btn.dataset.carryForward);
      });
    });
    wrap.querySelectorAll("[data-add-task]").forEach(function(btn){
      btn.addEventListener("click", function(e){ e.stopPropagation(); addTask(btn.dataset.addTask); });
    });
    wrap.querySelectorAll("[data-add-followups]").forEach(function(btn){
      btn.addEventListener("click", function(e){
        e.stopPropagation();
        openPatients[btn.dataset.addFollowups] = true;
        addFollowUpsForUnchecked(btn.dataset.addFollowups);
      });
    });
    wrap.querySelectorAll(".task-check").forEach(function(cb){
      cb.addEventListener("click", function(e){ e.stopPropagation(); toggleTask(cb.dataset.pid, cb.dataset.tid); });
    });
    wrap.querySelectorAll(".del-task").forEach(function(btn){
      btn.addEventListener("click", function(e){ e.stopPropagation(); deleteTask(btn.dataset.pid, btn.dataset.tid); });
    });
    wrap.querySelectorAll("[data-export-pdf]").forEach(function(btn){
      btn.addEventListener("click", function(e){ e.stopPropagation(); exportPatientPDF(btn.dataset.exportPdf); });
    });
    wrap.querySelectorAll("[data-tdm-note]").forEach(function(btn){
      btn.addEventListener("click", function(e){ e.stopPropagation(); exportTdmConsultNote(btn.dataset.tdmNote); });
    });
    wrap.querySelectorAll("[data-del-patient]").forEach(function(btn){
      btn.addEventListener("click", function(e){ e.stopPropagation(); deletePatient(btn.dataset.delPatient); });
    });
    Object.keys(openPatients).forEach(function(pid){
      if(openPatients[pid]){
        var el = document.getElementById("tasks-" + pid);
        if(el) el.classList.add("open");
      }
    });
  }

  // ================= PDF EXPORT (print-optimized view) =================
  var ORIGINAL_TITLE = document.title;

  function genTimestamp(){
    var now = new Date();
    return now.toLocaleDateString(undefined, { year:"numeric", month:"long", day:"numeric" }) +
      " at " + now.toLocaleTimeString(undefined, { hour:"numeric", minute:"2-digit" });
  }

  function buildPatientBlockHtml(p){
    var openTasks = p.tasks.filter(function(t){ return !t.done; })
      .sort(function(a,b){ return (a.due||"9999").localeCompare(b.due||"9999"); });
    var doneTasks = p.tasks.filter(function(t){ return t.done; });
    var today = getTodayChecks(p);

    var html = '<div class="print-patient-block">';
    html += '<div class="print-patient">';
    html += '<div class="print-patient-name">' + escapeHtml(p.name) + ' <span class="print-dim">(' + UNIT_LABELS[p.unit] + ')</span></div>';
    var metaBits = [];
    if(p.room) metaBits.push("Room " + p.room);
    if(p.dx) metaBits.push(p.dx);
    if(p.ef) metaBits.push("EF " + p.ef + "%");
    if(metaBits.length) html += '<div class="print-patient-room">' + escapeHtml(metaBits.join(" · ")) + '</div>';
    html += '</div>';

    var reviewItems = ROUNDS_CORE_ITEMS.slice();
    html += '<div class="print-section"><h2>Today’s Review Checklist</h2><ul class="print-list">';
    reviewItems.forEach(function(item){
      var checked = !!today[item.id];
      html += '<li class="' + (checked ? "print-checked" : "print-unchecked") + '">' + (checked ? "✓" : "☐") + ' ' + escapeHtml(item.t) + '</li>';
    });
    html += '</ul>';
    var renalBits = [];
    if(p.renalValue) renalBits.push("eGFR " + escapeHtml(p.renalValue) + (p.renalTrend ? " " + p.renalTrend : ""));
    if(p.crcl) renalBits.push("CrCl " + escapeHtml(p.crcl));
    if(renalBits.length) html += '<p class="print-dim" style="margin:6px 0 0 0;">Renal: ' + renalBits.join(" · ") + '</p>';
    if(p.focus.tdm){
      var tdmBits = [];
      if(p.tdmAgent) tdmBits.push("Agent: " + escapeHtml(p.tdmAgent));
      if(p.tdmTarget) tdmBits.push("Target: " + escapeHtml(p.tdmTarget));
      if(p.tdmNextTrough) tdmBits.push("Next trough due: " + formatDateTime(p.tdmNextTrough));
      html += '<p class="print-dim" style="margin:2px 0 0 0;">TDM/Levels — ' + (tdmBits.length ? tdmBits.join(" · ") : "not yet specified") + '</p>';
    }
    if(p.focus.insulin && (p.a1cLevel || p.a1cChanges)){
      var a1cBits = [];
      if(p.a1cLevel) a1cBits.push("A1C: " + escapeHtml(p.a1cLevel));
      if(p.a1cChanges) a1cBits.push("Suggested changes: " + escapeHtml(p.a1cChanges));
      html += '<p class="print-dim" style="margin:2px 0 0 0;">' + a1cBits.join(" · ") + '</p>';
    }
    html += '</div>';

    html += '<div class="print-section"><h2>Open Follow-Up Tasks (' + openTasks.length + ')</h2>';
    if(openTasks.length){
      html += '<table class="print-table"><thead><tr><th>Task</th><th>Due</th><th>Priority</th><th>Status</th></tr></thead><tbody>';
      openTasks.forEach(function(t){
        var status = dueStatus(t.due);
        var statusLabel = status === "overdue" ? "Overdue" : (status === "today" ? "Due Today" : (status === "ok" ? "Upcoming" : "—"));
        html += '<tr>' +
          '<td>' + escapeHtml(t.text) + '</td>' +
          '<td>' + formatDue(t.due) + '</td>' +
          '<td>' + (t.priority === "urgent" ? "Urgent" : "Routine") + '</td>' +
          '<td class="print-status-' + status + '">' + statusLabel + '</td>' +
        '</tr>';
      });
      html += '</tbody></table>';
    } else {
      html += '<p class="print-empty">No open follow-up tasks.</p>';
    }
    html += '</div>';

    html += '<div class="print-section"><h2>Completed Tasks (' + doneTasks.length + ')</h2>';
    if(doneTasks.length){
      html += '<ul class="print-list">';
      doneTasks.forEach(function(t){
        html += '<li>✓ ' + escapeHtml(t.text) + (t.due ? ' <span class="print-dim">(was due ' + formatDue(t.due) + ')</span>' : '') + '</li>';
      });
      html += '</ul>';
    } else {
      html += '<p class="print-empty">No completed tasks.</p>';
    }
    html += '</div>';

    html += '</div>'; // .print-patient-block
    return html;
  }

  function exportPatientPDF(pid){
    var p = state.patients.find(function(p){ return p.id === pid; });
    if(!p) return;

    var html = '<div class="print-header">' +
      '<h1>Patient Summary</h1>' +
      '<div class="print-meta">Generated ' + genTimestamp() + '</div>' +
    '</div>';

    html += '<div class="print-footer">G. Hopkins, RPh | RVH CCU &amp; Cardiac Floor | For Educational Use Only</div>';

    document.getElementById("print-area").innerHTML = html;
    document.title = "Patient Summary - " + p.name;
    window.print();
  }

      '<td>' + (p.tdmFrequency ? escapeHtml(p.tdmFrequency) : '&nbsp;') + '</td>' +
      '<td>&nbsp;</td>' +

  function exportAllPatients(){
    if(state.patients.length === 0){
      alert("No patients to export yet.");
      return;
    }
    var groups = groupedPatients();
    var ordered = UNIT_ORDER.reduce(function(acc, k){ return acc.concat(groups[k]); }, []);

    var html = '<div class="print-header">' +
      '<h1>Full Roster — Detailed Summary</h1>' +
      '<div class="print-meta">Generated ' + genTimestamp() + ' · ' + ordered.length + ' patient(s)</div>' +
    '</div>';
    ordered.forEach(function(p, idx){
      html += buildPatientBlockHtml(p);
      if(idx < ordered.length - 1) html += '<div class="print-pagebreak"></div>';
    });
    html += '<div class="print-footer">G. Hopkins, RPh | RVH CCU &amp; Cardiac Floor | For Educational Use Only</div>';

    document.getElementById("print-area").innerHTML = html;
    document.title = "Full Roster - Detailed Summary";
    window.print();
  }

  function buildRoundsPrintRow(p){
    var today = getTodayChecks(p);
    var medRec = !!today.medrec;
    var vte = !!today.vte;
    var renalBits = [];
    if(p.renalValue) renalBits.push("eGFR " + escapeHtml(p.renalValue) + (p.renalTrend ? " " + p.renalTrend : ""));
    if(p.crcl) renalBits.push("CrCl " + escapeHtml(p.crcl));
    var renalCell = renalBits.length ? renalBits.join("<br>") : "—";
    var focusParts = [];
    if(p.focus.tdm){
      var tdmBits = [];
      if(p.tdmAgent) tdmBits.push(escapeHtml(p.tdmAgent));
      if(p.tdmTarget) tdmBits.push("target " + escapeHtml(p.tdmTarget));
      if(p.tdmNextTrough) tdmBits.push("next trough " + formatDateTime(p.tdmNextTrough));
      focusParts.push("<div><strong>TDM / Levels:</strong> " + (tdmBits.length ? tdmBits.join(" · ") : '<span class="print-dim">not yet specified</span>') + "</div>");
    }
    if(p.focus.insulin && (p.a1cLevel || p.a1cChanges)){
      var a1cParts = [];
      if(p.a1cLevel) a1cParts.push("A1C " + escapeHtml(p.a1cLevel));
      if(p.a1cChanges) a1cParts.push(escapeHtml(p.a1cChanges));
      focusParts.push("<div><strong>A1C:</strong> " + a1cParts.join(" · ") + "</div>");
    }
    var focusCell = focusParts.join("");
    if(!focusCell) focusCell = '<span class="print-dim">—</span>';
    var openTasks = p.tasks.filter(function(t){ return !t.done; });
    var todoCell = openTasks.length
      ? openTasks.map(function(t){ return escapeHtml(t.text) + (t.due ? ' <span class="print-dim">(' + formatDue(t.due) + ')</span>' : ''); }).join('<br>')
      : '<span class="print-dim">—</span>';

    return '<tr>' +
      '<td>' + escapeHtml(p.room || "—") + '</td>' +
      '<td>' + escapeHtml(p.name) + '</td>' +
      '<td>' + escapeHtml(p.dx || "—") + (p.ef ? ' <span class="print-dim">(EF ' + escapeHtml(p.ef) + '%)</span>' : '') + '</td>' +
      '<td class="' + (medRec ? "print-status-ok" : "") + '">' + (medRec ? "✓" : "☐") + '</td>' +
      '<td class="' + (vte ? "print-status-ok" : "") + '">' + (vte ? "✓" : "☐") + '</td>' +
      '<td>' + renalCell + '</td>' +
      '<td class="print-focus-cell">' + focusCell + '</td>' +
      '<td>' + todoCell + '</td>' +
    '</tr>';
  }

  function exportRoundsPDF(){
    if(state.patients.length === 0){
      alert("No patients yet.");
      return;
    }
    var groups = groupedPatients();

    var html = '<div class="print-header">' +
      '<h1>Daily Rounds — ' + new Date().toLocaleDateString(undefined, { weekday:"long", month:"long", day:"numeric" }) + '</h1>' +
      '<div class="print-meta">Generated ' + genTimestamp() + ' · ' + state.patients.length + ' patient(s)</div>' +
    '</div>';

    UNIT_ORDER.forEach(function(unitKey){
      var list = groups[unitKey];
      if(!list.length) return;
      html += '<div class="print-section"><h2>' + UNIT_LABELS[unitKey] + ' (' + list.length + ')</h2>';
      html += '<table class="print-table print-rounds-table"><thead><tr>' +
        '<th>Room</th><th>Patient</th><th>Dx</th><th>Med Rec</th><th>VTE</th><th>Renal</th><th>TDM / A1C</th><th>To Do</th>' +
      '</tr></thead><tbody>';
      list.forEach(function(p){ html += buildRoundsPrintRow(p); });
      html += '</tbody></table></div>';
    });

    html += '<div class="print-footer">G. Hopkins, RPh | RVH CCU &amp; Cardiac Floor | For Educational Use Only</div>';

    document.getElementById("print-area").innerHTML = html;
    document.title = "Daily Rounds - " + todayStr();
    window.print();
  }

  window.addEventListener("afterprint", function(){
    document.title = ORIGINAL_TITLE;
  });

  // ================= INIT =================
  renderPatients();

})();
</script>
</body>
</html>
