<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CCU Initial Eval & Follow-Up Tracker</title>
<style>
  :root{
    --bg:#0B1220;
    --panel:#121B2E;
    --panel-2:#0F1829;
    --border:#1E2A3F;
    --border-soft:#182338;
    --teal:#2DD4BF;
    --teal-dim:#155E56;
    --teal-bg:rgba(45,212,191,0.10);
    --text:#E7ECF3;
    --text-dim:#8FA0B8;
    --text-faint:#5B6B84;
    --amber:#F5B942;
    --amber-bg:rgba(245,185,66,0.12);
    --red:#F16565;
    --red-bg:rgba(241,101,101,0.12);
    --green:#3FD07E;
    --green-bg:rgba(63,208,126,0.10);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;}
  body{padding-bottom:60px;}

  header{position:sticky; top:0; z-index:50; background:rgba(11,18,32,0.92); backdrop-filter:blur(8px);
    border-bottom:1px solid var(--border); padding:14px 20px;}
  .header-row{display:flex; align-items:center; justify-content:space-between; max-width:1100px; margin:0 auto; flex-wrap:wrap; gap:10px;}
  .brand{display:flex; align-items:baseline; gap:10px;}
  .brand .dot{width:9px; height:9px; border-radius:50%; background:var(--teal); box-shadow:0 0 10px var(--teal);}
  .brand h1{font-size:16px; margin:0; font-weight:650; letter-spacing:0.2px;}
  .brand .sub{font-size:11px; color:var(--text-dim); letter-spacing:0.3px; text-transform:uppercase;}

  nav.tabs{display:flex; gap:6px; background:var(--panel-2); border:1px solid var(--border); border-radius:10px; padding:4px;}
  nav.tabs button{background:transparent; border:none; color:var(--text-dim); font-size:13px; font-weight:600;
    padding:8px 14px; border-radius:8px; cursor:pointer; transition:all .15s;}
  nav.tabs button.active{background:var(--teal-bg); color:var(--teal);}
  nav.tabs button:hover:not(.active){color:var(--text);}

  main{max-width:1100px; margin:0 auto; padding:20px;}
  .view{display:none;}
  .view.active{display:block;}

  .panel{background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:18px; margin-bottom:16px;}
  .panel-title{font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:0.6px; color:var(--teal); margin:0 0 12px 0;}
  .panel-title-row{display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; margin-bottom:12px;}
  .panel-title-row .panel-title{margin:0;}

  /* ---------- Patients / Tracker ---------- */
  .add-patient-row{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:6px;}
  input, select, textarea{background:var(--panel-2); border:1px solid var(--border); color:var(--text);
    border-radius:8px; padding:9px 11px; font-size:14px; font-family:inherit;}
  input::placeholder, textarea::placeholder{color:var(--text-faint);}
  input:focus, select:focus, textarea:focus{outline:none; border-color:var(--teal);}
  .btn{background:var(--teal); color:#04201C; border:none; border-radius:8px; padding:9px 15px;
    font-size:13px; font-weight:700; cursor:pointer; transition:opacity .15s;}
  .btn:hover{opacity:0.88;}
  .btn.secondary{background:var(--panel-2); color:var(--text); border:1px solid var(--border);}
  .btn.danger{background:var(--red-bg); color:var(--red); border:1px solid rgba(241,101,101,0.3);}
  .btn.small{padding:5px 10px; font-size:12px;}

  .patient-card{background:var(--panel-2); border:1px solid var(--border-soft); border-radius:12px;
    padding:14px 16px; margin-bottom:12px;}
  .patient-head{display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:8px; cursor:pointer;}
  .patient-name{font-size:15px; font-weight:700;}
  .patient-meta{font-size:12px; color:var(--text-dim); margin-top:2px;}
  .badge{display:inline-block; font-size:11px; font-weight:700; padding:2px 8px; border-radius:20px; margin-left:6px;}
  .badge.overdue{background:var(--red-bg); color:var(--red);}
  .badge.today{background:var(--amber-bg); color:var(--amber);}
  .badge.ok{background:var(--green-bg); color:var(--green);}
  .badge.none{background:rgba(255,255,255,0.06); color:var(--text-faint);}

  .task-list{margin-top:12px; border-top:1px solid var(--border-soft); padding-top:10px; display:none;}
  .task-list.open{display:block;}
  .task-row{display:flex; align-items:flex-start; gap:10px; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.04);}
  .task-row:last-child{border-bottom:none;}
  .task-check{width:18px; height:18px; margin-top:2px; accent-color:var(--teal); cursor:pointer; flex-shrink:0;}
  .task-text{flex:1; font-size:13.5px;}
  .task-text.done{color:var(--text-faint); text-decoration:line-through;}
  .task-due{font-size:11px; color:var(--text-dim); white-space:nowrap;}
  .task-due.overdue{color:var(--red); font-weight:700;}
  .task-due.today{color:var(--amber); font-weight:700;}
  .task-priority{font-size:10px; font-weight:700; padding:1px 6px; border-radius:10px; text-transform:uppercase;}
  .task-priority.urgent{background:var(--red-bg); color:var(--red);}
  .task-priority.routine{background:rgba(255,255,255,0.06); color:var(--text-dim);}
  .del-task{background:none; border:none; color:var(--text-faint); cursor:pointer; font-size:15px; padding:0 4px;}
  .del-task:hover{color:var(--red);}

  .add-task-row{display:flex; gap:6px; flex-wrap:wrap; margin-top:10px; align-items:center;}
  .add-task-row input[type=text]{flex:2; min-width:160px;}
  .add-task-row input[type=date]{flex:1; min-width:130px;}
  .add-task-row select{flex:0 0 auto;}
  .add-task-row .spacer{flex:1 1 100%; height:0;}

  .empty{color:var(--text-faint); font-size:13px; text-align:center; padding:30px 0;}

  /* ---------- Initial Eval Guide ---------- */
  .eval-toolbar{display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:14px;}
  .eval-toolbar .hint{font-size:12px; color:var(--text-dim);}
  .category{border:1px solid var(--border-soft); border-radius:12px; margin-bottom:10px; overflow:hidden; background:var(--panel-2);}
  .cat-head{display:flex; justify-content:space-between; align-items:center; padding:12px 16px; cursor:pointer;}
  .cat-head:hover{background:rgba(255,255,255,0.02);}
  .cat-title{font-size:14px; font-weight:700; display:flex; align-items:center; gap:8px;}
  .cat-num{color:var(--teal); font-variant-numeric:tabular-nums;}
  .cat-progress{font-size:11px; color:var(--text-dim);}
  .cat-chevron{color:var(--text-faint); transition:transform .15s;}
  .cat-chevron.open{transform:rotate(90deg);}
  .cat-items{display:none; padding:0 16px 14px 16px;}
  .cat-items.open{display:block;}
  .eval-item{display:flex; align-items:flex-start; gap:10px; padding:7px 0;}
  .eval-item input{width:17px; height:17px; margin-top:2px; accent-color:var(--teal); cursor:pointer; flex-shrink:0;}
  .eval-item label{font-size:13.5px; line-height:1.4; cursor:pointer;}
  .eval-item .note{display:block; font-size:11.5px; color:var(--text-dim); margin-top:2px;}

  footer{text-align:center; font-size:11px; color:var(--text-faint); padding:30px 20px 10px; letter-spacing:0.2px;}

  @media (max-width:600px){
    .brand h1{font-size:14px;}
    nav.tabs button{padding:7px 10px; font-size:12px;}
    .task-due{white-space:normal;}
  }

  /* ---------- Print / PDF export ---------- */
  #print-area{display:none;}
  @media print{
    @page{ margin:1.4cm; }
    body > *:not(#print-area){ display:none !important; }
    body{ background:#fff !important; padding:0 !important; }
    #print-area{ display:block !important; background:#fff; color:#1a1a1a;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
  }
  .print-header{border-bottom:2px solid #333; padding-bottom:10px; margin-bottom:16px;}
  .print-header h1{font-size:19px; margin:0 0 4px 0;}
  .print-meta{font-size:11px; color:#555;}
  .print-patient{margin-bottom:14px;}
  .print-patient-name{font-size:16px; font-weight:700;}
  .print-patient-room{font-size:12px; color:#555; margin-top:1px;}
  .print-section{margin-bottom:18px;}
  .print-section h2{font-size:12.5px; text-transform:uppercase; letter-spacing:0.5px; color:#333;
    border-bottom:1px solid #ccc; padding-bottom:4px; margin:0 0 8px 0;}
  .print-table{width:100%; border-collapse:collapse; font-size:12px;}
  .print-table th, .print-table td{text-align:left; padding:5px 8px; border-bottom:1px solid #ddd; vertical-align:top;}
  .print-table th{font-size:10.5px; text-transform:uppercase; color:#555; font-weight:700;}
  .print-status-overdue{color:#b91c1c; font-weight:700;}
  .print-status-today{color:#b45309; font-weight:700;}
  .print-status-ok{color:#1a7a4c;}
  .print-list{list-style:none; padding:0; margin:0; font-size:12.5px;}
  .print-list li{padding:3px 0;}
  .print-checked{color:#1a1a1a;}
  .print-unchecked{color:#888;}
  .print-dim{color:#888; font-size:11px;}
  .print-empty{font-size:12px; color:#888; font-style:italic; margin:0;}
  .print-cat{margin-bottom:10px;}
  .print-cat-title{font-weight:700; font-size:12.5px; margin-bottom:3px;}
  .print-footer{margin-top:24px; padding-top:8px; border-top:1px solid #ccc; font-size:10.5px; color:#888; text-align:center;}
  .print-patient-block + .print-patient-block{margin-top:26px;}
  .print-pagebreak{page-break-after:always;}
</style>
</head>
<body>

<header>
  <div class="header-row">
    <div class="brand">
      <span class="dot"></span>
      <div>
        <h1>CCU Tracker</h1>
        <div class="sub">Initial Eval &amp; Follow-Up</div>
      </div>
    </div>
    <nav class="tabs">
      <button class="tab-btn active" data-view="tracker">Follow-Up Tracker</button>
      <button class="tab-btn" data-view="evalguide">Initial Eval Guide</button>
    </nav>
  </div>
</header>

<main>

  <!-- ===================== TRACKER VIEW ===================== -->
  <div class="view active" id="view-tracker">
    <div class="panel">
      <div class="panel-title-row">
        <div class="panel-title">Add Patient</div>
        <button class="btn secondary small" id="export-all-btn">Export All (PDF)</button>
      </div>
      <div class="add-patient-row">
        <input type="text" id="np-name" placeholder="Name / Initials" style="flex:2; min-width:140px;">
        <input type="text" id="np-room" placeholder="Room / Bed" style="flex:1; min-width:100px;">
        <button class="btn" id="add-patient-btn">+ Add Patient</button>
      </div>
    </div>

    <div id="patient-list"></div>
  </div>

  <!-- ===================== INITIAL EVAL GUIDE VIEW ===================== -->
  <div class="view" id="view-evalguide">
    <div class="panel">
      <div class="panel-title">Track Progress For</div>
      <div class="eval-toolbar">
        <select id="eval-patient-select">
          <option value="">— Reference only (not saved) —</option>
        </select>
        <span class="hint">Selecting a patient saves your checklist progress for them. Otherwise this is a blank reference each visit.</span>
      </div>
    </div>
    <div id="eval-categories"></div>
  </div>

</main>

<footer>G. Hopkins, RPh | RVH CCU | For Educational Use Only</footer>

<!-- Populated on demand and shown only when printing -->
<div id="print-area"></div>

<script>
(function(){
  "use strict";

  // ---------------- Storage ----------------
  var STORE_KEY = "ccu_tracker_v1";
  function loadState(){
    try{
      var raw = localStorage.getItem(STORE_KEY);
      if(raw) return JSON.parse(raw);
    }catch(e){}
    return { patients: [] };
  }
  function saveState(){
    try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }catch(e){}
  }
  var state = loadState();

  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

  // ---------------- Initial Eval Checklist Template ----------------
  var EVAL_TEMPLATE = [
    { title: "Admission & Goals", items: [
      { t: "Reason for CCU admission / working diagnosis confirmed" },
      { t: "Code status documented", n: "Confirm before making high-risk therapy decisions" },
      { t: "Goals of care relevant to pharmacotherapy noted (if applicable)" },
    ]},
    { title: "Medication Reconciliation", items: [
      { t: "Home medication list reconciled against current orders" },
      { t: "Allergies and reaction type verified" },
      { t: "High-risk / narrow-therapeutic-index home meds identified" },
    ]},
    { title: "Renal & Hepatic Function", items: [
      { t: "Baseline creatinine / eGFR reviewed", n: "Trend, not just most recent value" },
      { t: "LFTs reviewed if hepatically-cleared agents in use" },
      { t: "Renal/hepatic dose adjustments confirmed for all active orders" },
    ]},
    { title: "Hemodynamics & Rhythm", items: [
      { t: "Current rhythm and telemetry indication reviewed" },
      { t: "Pressor / inotrope requirement and trend assessed" },
      { t: "Baseline QTc reviewed if any QT-prolonging agents are active" },
    ]},
    { title: "GDMT Status (if Heart Failure)", items: [
      { t: "ACEi/ARB/ARNI — continued, held, or contraindicated (document why)" },
      { t: "Beta-blocker — continued, held, or contraindicated" },
      { t: "MRA — continued, held, or contraindicated" },
      { t: "SGLT2i — continued, held, or contraindicated" },
    ]},
    { title: "Anticoagulation", items: [
      { t: "Indication for anticoagulation confirmed" },
      { t: "Agent and renal-adjusted dose appropriate" },
      { t: "Bridging needs assessed if applicable" },
      { t: "Bleeding risk assessed (e.g., HAS-BLED or equivalent)" },
    ]},
    { title: "Sedation & Analgesia (if intubated)", items: [
      { t: "RASS target defined and current RASS reviewed" },
      { t: "Agents and doses appropriate for hemodynamic status" },
      { t: "Daily SAT/SBT candidacy assessed" },
    ]},
    { title: "Infection & Antimicrobials", items: [
      { t: "Active infection / pending cultures reviewed" },
      { t: "Antibiotic renal dosing confirmed" },
      { t: "Planned duration / stop date documented" },
    ]},
    { title: "Prophylaxis", items: [
      { t: "VTE prophylaxis appropriate for bleeding/renal status" },
      { t: "Stress ulcer prophylaxis indicated and appropriate" },
    ]},
    { title: "Electrolytes & TDM", items: [
      { t: "K+/Mg2+ targets reviewed, esp. if on antiarrhythmics" },
      { t: "Repletion protocol in place if needed" },
      { t: "Any active TDM agents identified (heparin, vancomycin, amiodarone, digoxin, etc.)" },
    ]},
    { title: "Nutrition", items: [
      { t: "Nutrition route confirmed (PO/enteral/parenteral)" },
      { t: "Drug–nutrient interactions checked (e.g., warfarin/vitamin K, phenytoin/tube feeds)" },
    ]},
  ];

  // ================= TAB SWITCHING =================
  var tabBtns = document.querySelectorAll(".tab-btn");
  tabBtns.forEach(function(btn){
    btn.addEventListener("click", function(){
      tabBtns.forEach(function(b){ b.classList.remove("active"); });
      btn.classList.add("active");
      document.querySelectorAll(".view").forEach(function(v){ v.classList.remove("active"); });
      document.getElementById("view-" + btn.dataset.view).classList.add("active");
      if(btn.dataset.view === "evalguide") renderEvalPatientSelect();
    });
  });

  // ================= DATE HELPERS =================
  function todayStr(){
    var d = new Date();
    return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
  }
  function dueStatus(dateStr){
    if(!dateStr) return "none";
    if(dateStr < todayStr()) return "overdue";
    if(dateStr === todayStr()) return "today";
    return "ok";
  }
  function formatDue(dateStr){
    if(!dateStr) return "No date";
    var parts = dateStr.split("-");
    var d = new Date(parts[0], parts[1]-1, parts[2]);
    return d.toLocaleDateString(undefined, { month:"short", day:"numeric" });
  }

  // ================= PATIENT TRACKER =================
  var openPatients = {};

  document.getElementById("add-patient-btn").addEventListener("click", addPatient);
  document.getElementById("np-name").addEventListener("keydown", function(e){ if(e.key==="Enter") addPatient(); });
  document.getElementById("export-all-btn").addEventListener("click", exportAllPatients);

  function addPatient(){
    var nameEl = document.getElementById("np-name");
    var roomEl = document.getElementById("np-room");
    var name = nameEl.value.trim();
    if(!name) return;
    var p = { id: uid(), name: name, room: roomEl.value.trim(), tasks: [], evalChecked: {} };
    state.patients.unshift(p);
    nameEl.value = ""; roomEl.value = "";
    saveState();
    renderPatients();
    renderEvalPatientSelect();
  }

  function deletePatient(id){
    if(!confirm("Remove this patient and all their tasks?")) return;
    state.patients = state.patients.filter(function(p){ return p.id !== id; });
    saveState();
    renderPatients();
    renderEvalPatientSelect();
  }

  function patientBadge(p){
    var statuses = p.tasks.filter(function(t){ return !t.done; }).map(function(t){ return dueStatus(t.due); });
    if(statuses.indexOf("overdue") !== -1) return { cls:"overdue", label: statuses.filter(s=>s==="overdue").length + " overdue" };
    if(statuses.indexOf("today") !== -1) return { cls:"today", label: statuses.filter(s=>s==="today").length + " due today" };
    if(statuses.length > 0) return { cls:"ok", label: statuses.length + " open" };
    return { cls:"none", label:"No open tasks" };
  }

  function renderPatients(){
    var wrap = document.getElementById("patient-list");
    wrap.innerHTML = "";
    if(state.patients.length === 0){
      wrap.innerHTML = '<div class="panel"><div class="empty">No patients added yet. Add one above to start tracking follow-up tasks.</div></div>';
      return;
    }
    state.patients.forEach(function(p){
      var badge = patientBadge(p);
      var card = document.createElement("div");
      card.className = "patient-card";

      var openTasks = p.tasks.filter(function(t){ return !t.done; })
        .sort(function(a,b){ return (a.due||"9999").localeCompare(b.due||"9999"); });
      var doneTasks = p.tasks.filter(function(t){ return t.done; });
      var ordered = openTasks.concat(doneTasks);

      card.innerHTML =
        '<div class="patient-head" data-pid="' + p.id + '">' +
          '<div>' +
            '<span class="patient-name">' + escapeHtml(p.name) + '</span>' +
            (p.room ? '<span class="patient-meta"> Room ' + escapeHtml(p.room) + '</span>' : '') +
          '</div>' +
          '<div><span class="badge ' + badge.cls + '">' + badge.label + '</span></div>' +
        '</div>' +
        '<div class="task-list" id="tasks-' + p.id + '">' +
          (ordered.length ? ordered.map(function(t){ return taskRowHtml(p.id, t); }).join("") : '<div class="empty">No follow-up tasks yet.</div>') +
          '<div class="add-task-row">' +
            '<input type="text" placeholder="New reminder / follow-up task" id="nt-text-' + p.id + '">' +
            '<input type="date" id="nt-date-' + p.id + '">' +
            '<select id="nt-pri-' + p.id + '"><option value="routine">Routine</option><option value="urgent">Urgent</option></select>' +
            '<button class="btn small" data-add-task="' + p.id + '">+ Add</button>' +
            '<span class="spacer"></span>' +
            '<button class="btn small secondary" data-export-pdf="' + p.id + '">Export PDF</button>' +
            '<button class="btn small danger" data-del-patient="' + p.id + '">Remove Patient</button>' +
          '</div>' +
        '</div>';
      wrap.appendChild(card);
    });

    // wire events
    wrap.querySelectorAll(".patient-head").forEach(function(head){
      head.addEventListener("click", function(){
        var pid = head.dataset.pid;
        openPatients[pid] = !openPatients[pid];
        document.getElementById("tasks-" + pid).classList.toggle("open", openPatients[pid]);
      });
    });
    wrap.querySelectorAll("[data-add-task]").forEach(function(btn){
      btn.addEventListener("click", function(){ addTask(btn.dataset.addTask); });
    });
    wrap.querySelectorAll("[data-del-patient]").forEach(function(btn){
      btn.addEventListener("click", function(e){ e.stopPropagation(); deletePatient(btn.dataset.delPatient); });
    });
    wrap.querySelectorAll("[data-export-pdf]").forEach(function(btn){
      btn.addEventListener("click", function(e){ e.stopPropagation(); exportPatientPDF(btn.dataset.exportPdf); });
    });
    wrap.querySelectorAll(".task-check").forEach(function(cb){
      cb.addEventListener("click", function(e){ e.stopPropagation(); toggleTask(cb.dataset.pid, cb.dataset.tid); });
    });
    wrap.querySelectorAll(".del-task").forEach(function(btn){
      btn.addEventListener("click", function(e){ e.stopPropagation(); deleteTask(btn.dataset.pid, btn.dataset.tid); });
    });
    // restore open state
    Object.keys(openPatients).forEach(function(pid){
      if(openPatients[pid]){
        var el = document.getElementById("tasks-" + pid);
        if(el) el.classList.add("open");
      }
    });
  }

  function taskRowHtml(pid, t){
    var status = t.done ? "" : dueStatus(t.due);
    var dueCls = status === "overdue" ? "overdue" : (status === "today" ? "today" : "");
    return '<div class="task-row">' +
      '<input type="checkbox" class="task-check" data-pid="' + pid + '" data-tid="' + t.id + '" ' + (t.done ? "checked" : "") + '>' +
      '<div class="task-text ' + (t.done ? "done" : "") + '">' + escapeHtml(t.text) +
        (t.priority === "urgent" ? ' <span class="task-priority urgent">Urgent</span>' : '') +
      '</div>' +
      '<div class="task-due ' + dueCls + '">' + formatDue(t.due) + '</div>' +
      '<button class="del-task" data-pid="' + pid + '" data-tid="' + t.id + '" title="Delete">×</button>' +
    '</div>';
  }

  function addTask(pid){
    var p = state.patients.find(function(p){ return p.id === pid; });
    if(!p) return;
    var textEl = document.getElementById("nt-text-" + pid);
    var dateEl = document.getElementById("nt-date-" + pid);
    var priEl = document.getElementById("nt-pri-" + pid);
    var text = textEl.value.trim();
    if(!text) return;
    p.tasks.push({ id: uid(), text: text, due: dateEl.value || "", priority: priEl.value, done: false });
    saveState();
    openPatients[pid] = true;
    renderPatients();
  }

  function toggleTask(pid, tid){
    var p = state.patients.find(function(p){ return p.id === pid; });
    if(!p) return;
    var t = p.tasks.find(function(t){ return t.id === tid; });
    if(!t) return;
    t.done = !t.done;
    saveState();
    openPatients[pid] = true;
    renderPatients();
  }

  function deleteTask(pid, tid){
    var p = state.patients.find(function(p){ return p.id === pid; });
    if(!p) return;
    p.tasks = p.tasks.filter(function(t){ return t.id !== tid; });
    saveState();
    openPatients[pid] = true;
    renderPatients();
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, function(c){
      return { "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c];
    });
  }

  // ================= PDF EXPORT (print-optimized view) =================
  var ORIGINAL_TITLE = document.title;

  function genTimestamp(){
    var now = new Date();
    return now.toLocaleDateString(undefined, { year:"numeric", month:"long", day:"numeric" }) +
      " at " + now.toLocaleTimeString(undefined, { hour:"numeric", minute:"2-digit" });
  }

  // Builds the printable HTML for a single patient (used by both single and full-roster export)
  function buildPatientBlockHtml(p){
    var openTasks = p.tasks.filter(function(t){ return !t.done; })
      .sort(function(a,b){ return (a.due||"9999").localeCompare(b.due||"9999"); });
    var doneTasks = p.tasks.filter(function(t){ return t.done; });

    var html = '<div class="print-patient-block">';
    html += '<div class="print-patient">';
    html += '<div class="print-patient-name">' + escapeHtml(p.name) + '</div>';
    if(p.room) html += '<div class="print-patient-room">Room ' + escapeHtml(p.room) + '</div>';
    html += '</div>';

    html += '<div class="print-section"><h2>Open Follow-Up Tasks (' + openTasks.length + ')</h2>';
    if(openTasks.length){
      html += '<table class="print-table"><thead><tr><th>Task</th><th>Due</th><th>Priority</th><th>Status</th></tr></thead><tbody>';
      openTasks.forEach(function(t){
        var status = dueStatus(t.due);
        var statusLabel = status === "overdue" ? "Overdue" : (status === "today" ? "Due Today" : (status === "ok" ? "Upcoming" : "—"));
        html += '<tr>' +
          '<td>' + escapeHtml(t.text) + '</td>' +
          '<td>' + formatDue(t.due) + '</td>' +
          '<td>' + (t.priority === "urgent" ? "Urgent" : "Routine") + '</td>' +
          '<td class="print-status-' + status + '">' + statusLabel + '</td>' +
        '</tr>';
      });
      html += '</tbody></table>';
    } else {
      html += '<p class="print-empty">No open follow-up tasks.</p>';
    }
    html += '</div>';

    html += '<div class="print-section"><h2>Completed Tasks (' + doneTasks.length + ')</h2>';
    if(doneTasks.length){
      html += '<ul class="print-list">';
      doneTasks.forEach(function(t){
        html += '<li>✓ ' + escapeHtml(t.text) + (t.due ? ' <span class="print-dim">(was due ' + formatDue(t.due) + ')</span>' : '') + '</li>';
      });
      html += '</ul>';
    } else {
      html += '<p class="print-empty">No completed tasks.</p>';
    }
    html += '</div>';

    var checks = p.evalChecked || {};
    var hasChecks = Object.keys(checks).some(function(k){ return checks[k]; });
    if(hasChecks){
      html += '<div class="print-section"><h2>Initial Eval Checklist Progress</h2>';
      EVAL_TEMPLATE.forEach(function(cat, ci){
        var catId = "cat" + ci;
        var checkedItems = [];
        cat.items.forEach(function(item, ii){
          var itemId = catId + "-" + ii;
          if(checks[itemId]) checkedItems.push(item.t);
        });
        if(checkedItems.length === 0) return;
        html += '<div class="print-cat"><div class="print-cat-title">' + escapeHtml(cat.title) + ' (' + checkedItems.length + '/' + cat.items.length + ')</div>';
        html += '<ul class="print-list">';
        checkedItems.forEach(function(t){ html += '<li class="print-checked">✓ ' + escapeHtml(t) + '</li>'; });
        html += '</ul></div>';
      });
      html += '</div>';
    }

    html += '</div>'; // .print-patient-block
    return html;
  }

  function exportPatientPDF(pid){
    var p = state.patients.find(function(p){ return p.id === pid; });
    if(!p) return;

    var html = '<div class="print-header">' +
      '<h1>CCU Follow-Up Summary</h1>' +
      '<div class="print-meta">Generated ' + genTimestamp() + '</div>' +
    '</div>';
    html += buildPatientBlockHtml(p);
    html += '<div class="print-footer">G. Hopkins, RPh | RVH CCU | For Educational Use Only</div>';

    document.getElementById("print-area").innerHTML = html;
    document.title = "CCU Follow-Up - " + p.name;
    window.print();
  }

  function exportAllPatients(){
    if(state.patients.length === 0){
      alert("No patients to export yet.");
      return;
    }
    var html = '<div class="print-header">' +
      '<h1>CCU Follow-Up Tracker — Full Roster</h1>' +
      '<div class="print-meta">Generated ' + genTimestamp() + ' · ' + state.patients.length + ' patient(s)</div>' +
    '</div>';
    state.patients.forEach(function(p, idx){
      html += buildPatientBlockHtml(p);
      if(idx < state.patients.length - 1) html += '<div class="print-pagebreak"></div>';
    });
    html += '<div class="print-footer">G. Hopkins, RPh | RVH CCU | For Educational Use Only</div>';

    document.getElementById("print-area").innerHTML = html;
    document.title = "CCU Follow-Up - Full Roster";
    window.print();
  }

  window.addEventListener("afterprint", function(){
    document.title = ORIGINAL_TITLE;
  });

  // ================= INITIAL EVAL GUIDE =================
  var openCats = {};
  var currentEvalPatientId = "";

  function renderEvalPatientSelect(){
    var sel = document.getElementById("eval-patient-select");
    var prev = sel.value;
    sel.innerHTML = '<option value="">— Reference only (not saved) —</option>' +
      state.patients.map(function(p){ return '<option value="' + p.id + '">' + escapeHtml(p.name) + (p.room ? " (Rm " + escapeHtml(p.room) + ")" : "") + '</option>'; }).join("");
    if(state.patients.some(function(p){ return p.id === prev; })) sel.value = prev;
    currentEvalPatientId = sel.value;
  }
  document.getElementById("eval-patient-select").addEventListener("change", function(e){
    currentEvalPatientId = e.target.value;
    renderEvalCategories();
  });

  function getEvalChecks(){
    if(!currentEvalPatientId) return {};
    var p = state.patients.find(function(p){ return p.id === currentEvalPatientId; });
    return p ? p.evalChecked : {};
  }
  function setEvalCheck(itemId, val){
    if(!currentEvalPatientId) return;
    var p = state.patients.find(function(p){ return p.id === currentEvalPatientId; });
    if(!p) return;
    p.evalChecked[itemId] = val;
    saveState();
  }

  function renderEvalCategories(){
    var wrap = document.getElementById("eval-categories");
    wrap.innerHTML = "";
    var checks = getEvalChecks();

    EVAL_TEMPLATE.forEach(function(cat, ci){
      var catId = "cat" + ci;
      var itemsHtml = "";
      var checkedCount = 0;
      cat.items.forEach(function(item, ii){
        var itemId = catId + "-" + ii;
        var checked = !!checks[itemId];
        if(checked) checkedCount++;
        itemsHtml += '<div class="eval-item">' +
          '<input type="checkbox" id="chk-' + itemId + '" data-item="' + itemId + '" ' + (checked ? "checked" : "") + (currentEvalPatientId ? "" : " ") + '>' +
          '<label for="chk-' + itemId + '">' + escapeHtml(item.t) + (item.n ? '<span class="note">' + escapeHtml(item.n) + '</span>' : '') + '</label>' +
        '</div>';
      });

      var catDiv = document.createElement("div");
      catDiv.className = "category";
      catDiv.innerHTML =
        '<div class="cat-head" data-cat="' + catId + '">' +
          '<div class="cat-title"><span class="cat-num">' + (ci+1) + '.</span> ' + escapeHtml(cat.title) + '</div>' +
          '<div style="display:flex; align-items:center; gap:10px;">' +
            '<span class="cat-progress">' + checkedCount + '/' + cat.items.length + '</span>' +
            '<span class="cat-chevron' + (openCats[catId] ? " open" : "") + '">›</span>' +
          '</div>' +
        '</div>' +
        '<div class="cat-items' + (openCats[catId] ? " open" : "") + '" id="items-' + catId + '">' + itemsHtml + '</div>';
      wrap.appendChild(catDiv);
    });

    wrap.querySelectorAll(".cat-head").forEach(function(head){
      head.addEventListener("click", function(){
        var catId = head.dataset.cat;
        openCats[catId] = !openCats[catId];
        document.getElementById("items-" + catId).classList.toggle("open", openCats[catId]);
        head.querySelector(".cat-chevron").classList.toggle("open", openCats[catId]);
      });
    });
    wrap.querySelectorAll('input[type=checkbox][data-item]').forEach(function(cb){
      cb.addEventListener("click", function(e){ e.stopPropagation(); });
      cb.addEventListener("change", function(){
        setEvalCheck(cb.dataset.item, cb.checked);
        renderEvalCategories();
      });
    });
  }

  // ================= INIT =================
  renderPatients();
  renderEvalPatientSelect();
  renderEvalCategories();

})();
</script>
</body>
</html>
